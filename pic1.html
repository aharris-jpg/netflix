<style>

</style>
</head>
<body>
<figure>
  <img src="https://plus.unsplash.com/premium_photo-1733353275493-38fa0c89e2e2?q=80&w=1807&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
       alt="Person watching a streaming series alone at night, lit by TV glow">

</figure>

</html>
