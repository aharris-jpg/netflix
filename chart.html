<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Netflix Cancellation Odds 2026 — Canada Sports Betting</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #1C2B3A; }
.wrap { max-width: 720px; margin: 0 auto; border: 1px solid #E0DDD6; border-radius: 12px; overflow: hidden; }

.hdr { background: #1C2B3A; color: #fff; padding: 18px 22px; position: relative; overflow: hidden; }
.hdr h2 { margin: 0 0 4px; font-size: 18px; font-weight: 800; }
.hdr p { margin: 0; font-size: 13px; color: #cdd5dd; }
.shimmer {
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #D0021B, #ff6b6b, #D0021B);
  background-size: 200% 100%; animation: sh 3s linear infinite;
}
@keyframes sh { 0%{background-position:0% 0}100%{background-position:200% 0} }

.tabs { display: flex; background: #f7f3ee; border-bottom: 1px solid #E0DDD6; }
.tab {
  flex: 1; text-align: center; padding: 11px 6px 12px; font-size: 12.5px; font-weight: 700;
  color: #5b6b7a; cursor: pointer; border-bottom: 3px solid transparent;
  transition: all .15s ease; border-right: 1px solid #E0DDD6;
}
.tab:last-child { border-right: none; }
.tab.active { color: #D0021B; border-bottom-color: #D0021B; background: #fff; }

.body { padding: 20px 22px 16px; }

/* Each show row */
.show { margin-bottom: 18px; }
.show:last-child { margin-bottom: 0; }

.show-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 5px; gap: 12px;
}
.show-name { font-size: 14px; font-weight: 700; flex: 1; }
.show-pct { font-size: 16px; font-weight: 800; color: #D0021B; white-space: nowrap; flex-shrink: 0; }
.show-pct.safe { color: #5b6b7a; }

.bar-track { background: #f0ece5; border-radius: 3px; height: 7px; margin-bottom: 5px; }
.bar-fill { height: 7px; border-radius: 3px; background: #D0021B; }
.bar-fill.safe { background: #9bb8d4; }

.show-data {
  font-size: 12px; color: #8b95a0; line-height: 1.4;
}

/* Pill views */
.pill-wrap { padding: 4px 0; }
.pill-summary { font-size: 13.5px; color: #5b6b7a; margin-bottom: 14px; font-weight: 600; }
.pill-grid { display: flex; flex-wrap: wrap; gap: 9px; }
.pill { font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 20px; border: 1px solid #E0DDD6; background: #f7f3ee; color: #1C2B3A; }
.pill.renewed { border-color: #1C2B3A; background: #f7f3ee; color: #1C2B3A; }
.pill.cancelled { border-color: #D0021B; background: #fdeaea; color: #D0021B; }

.footer { display: flex; justify-content: space-between; align-items: center; padding: 11px 22px; border-top: 1px solid #E0DDD6; background: #f7f3ee; font-size: 11.5px; color: #8b95a0; }
.logo { font-weight: 800; color: #D0021B; font-size: 12.5px; }

@media (max-width: 540px) {
  .show-name { font-size: 13px; }
  .show-pct { font-size: 15px; }
  .body { padding: 16px 16px 12px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="shimmer"></div>
    <h2>Netflix Netflix Cancellation Odds 2026</h2>
    <p>Implied Probability &mdash; 52 shows tracked, Jul 1, 2026</p>
  </div>
  <div class="tabs">
    <div class="tab active" data-view="prob">Implied Probability (7)</div>
    <div class="tab" data-view="renewed">Confirmed Renewed (28)</div>
    <div class="tab" data-view="cancelled">Confirmed Cancelled (18)</div>
  </div>
  <div class="body" id="chartBody"></div>
  <div class="footer">
    <span>IMDb &middot; Rotten Tomatoes &middot; Netflix Tudum &mdash; Jun 30, 2026</span>
    <span class="logo">CanadaSportsBetting.ca</span>
  </div>
</div>

<script>
var MAX = 79.33;
var shows = [
  { name:'How to Get to Heaven From Belfast', pct:79.33, safe:false,
    data:'138 days without a decision &middot; 0 weeks in Top 10 &middot; RT 95% / 79% &middot; IMDb 7.4 &middot; #380 popularity' },
  { name:'Beef', pct:44.30, safe:false,
    data:'75 days without a decision &middot; 2 weeks in Top 10 &middot; RT 89% / 63% &middot; IMDb 7.5 (S2) &middot; #69 popularity' },

  { name:'The Witness', pct:34.76, safe:false,
    data:'26 days without a decision &middot; 3 weeks in Top 10 &middot; RT 100% / 49% &middot; IMDb 6.5 &middot; #127 popularity' },
  { name:'I Will Find You', pct:29.88, safe:true,
    data:'12 days without a decision &middot; 2 weeks in Top 10 &middot; RT 61% / 62% &middot; IMDb 7.2 &middot; #1 popularity' },
  { name:'Man on Fire', pct:28.42, safe:true,
    data:'61 days without a decision &middot; 7 weeks in Top 10 &middot; RT 58% / 63% &middot; IMDb 6.7 &middot; #126 popularity' },
  { name:'Teach You a Lesson', pct:26.20, safe:true,
    data:'25 days without a decision &middot; 3 weeks in Top 10 &middot; RT 86% / 94% &middot; IMDb 8.5 &middot; #24 popularity' }
];

var renewed = [
  'Nemesis',
  'Avatar: The Last Airbender','The Four Seasons','Barbecue Showdown','Black Mirror','3 Body Problem',
  'One Piece','Nobody Wants This','Bridgerton','The Lincoln Lawyer','The Night Agent','Emily in Paris',
  'Devil May Cry','A Good Girl\'s Guide to Murder','Beauty in Black','My Life with the Walter Boys',
  'Funny AF with Kevin Hart','House of Guinness','Love Is Blind','Love on the Spectrum U.S.',
  'Little House on the Prairie','Ginny & Georgia','Worst Ex Ever','I Think You Should Leave with Tim Robinson',
  'Indian Matchmaking','Is It Cake?','Leanne','Finding Her Edge'
];
var cancelled = [
  'The Boroughs','Building the Band','Bandi','Pop the Balloon Live','Strip Law','Selling the City',
  'Miss Governor','Alice in Borderland','Terminator Zero','The Vince Staples Show','The Abandons',
  'F1: The Academy','What\'s in the Box?','Class','With Love, Meghan','You','Boots','The Waterfront'
];

function renderProb() {
  var html = '';
  shows.forEach(function(s) {
    var w = (s.pct / MAX * 100).toFixed(1);
    html += '<div class="show">'
      + '<div class="show-top">'
      + '<div class="show-name">' + s.name + '</div>'
      + '<div class="show-pct ' + (s.safe ? 'safe' : '') + '">' + s.pct + '%</div>'
      + '</div>'
      + '<div class="bar-track"><div class="bar-fill ' + (s.safe ? 'safe' : '') + '" style="width:' + w + '%"></div></div>'
      + '<div class="show-data">' + s.data + '</div>'
      + '</div>';
  });
  document.getElementById('chartBody').innerHTML = html;
}

function renderPills(list, cls, label) {
  var pills = list.map(function(n) { return '<span class="pill ' + cls + '">' + n + '</span>'; }).join('');
  document.getElementById('chartBody').innerHTML =
    '<div class="pill-wrap"><div class="pill-summary">' + list.length + ' shows ' + label + ' in 2026</div>'
    + '<div class="pill-grid">' + pills + '</div></div>';
}

document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
    t.classList.add('active');
    var v = t.dataset.view;
    if (v === 'prob') renderProb();
    else if (v === 'renewed') renderPills(renewed, 'renewed', 'confirmed renewed');
    else renderPills(cancelled, 'cancelled', 'confirmed cancelled');
  });
});

renderProb();
</script>
</body>
</html>
