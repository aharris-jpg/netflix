<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; }
  figure {
    margin: 0;
    border-top: 4px solid;
    border-image: linear-gradient(90deg, #1C2B3A, #D0021B) 1;
  }
  figure img { width: 100%; height: 360px; object-fit: cover; display: block; }
  figcaption { background: #1C2B3A; color: #cdd5dd; font-size: 12px; padding: 8px 14px; }
</style>
</head>
<body>
<figure>
  <img src="https://images.unsplash.com/photo-1586899028174-e7098604235b?q=80&w=1742&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
       alt="Dark, moody crime drama scene evoking a streaming thriller series">
  <figcaption>Strong global chart performance is keeping shows like Nemesis off the chopping block, for now.</figcaption>
</figure>
</body>
</html>
